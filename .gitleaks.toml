[extend]
useDefault = true

[allowlist]
description = "Skip encrypted secrets"
regexTarget = "match"
regexes = [
  '''(?i)!!enveloped:''', # Encrypted secrets
  '''ENC\[AES256_GCM,data:''', # sops secrets
]
paths = [
  '''\.sops\.ya?ml$''', # sopsdiffer decrypts in diffs; forbid-secrets hook guards unencrypted files
]
