---
# https://rancher.com/docs/k3s/latest/en/installation/install-options/agent-config/
# https://github.com/PyratLabs/ansible-role-k3s

# (bool) Specify if a host (or host group) are part of the control plane
k3s_control_node: false

# (dict) k3s settings for all worker nodes
k3s_agent:
  node-ip: "{{ ansible_host }}"
  embedded-registry: true
  kubelet-arg:
    - "kube-reserved=cpu=200m,memory=256Mi"
    - "system-reserved=cpu=200m,memory=256Mi"
    - "image-gc-low-threshold=50"
    - "image-gc-high-threshold=55"
    - "eviction-hard=memory.available<5%,nodefs.available<10%"
    - "eviction-soft=memory.available<10%,nodefs.available<15%"
    - "eviction-soft-grace-period=memory.available=2m,nodefs.available=2m"
