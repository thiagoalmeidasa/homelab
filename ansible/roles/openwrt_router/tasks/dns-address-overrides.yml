---
# Manages dnsmasq `address=/domain/ip` directives as a UCI list under
# `dhcp.@dnsmasq[0].address`. Unlike the per-host `domain` sections
# (dns-hostnames.yml, additive only), this list is treated declaratively:
# the value of `openwrt_router_dns_address_overrides` in the playbook IS the source of
# truth. Entries not listed here will be removed on next run.

- name: DNS | Build dnsmasq address directive list
  ansible.builtin.set_fact:
    openwrt_router_dnsmasq_address_directives: >-
      {{
        (openwrt_router_dns_address_overrides | default([])
          | map(attribute='domain')
          | zip(openwrt_router_dns_address_overrides | default([]) | map(attribute='ip'))
          | map('join', '/')
          | map('regex_replace', '^', '/')
          | list)
        +
        (public_lan_subdomains | default([])
          | map('regex_replace', '^(.*)$', '/\1.' ~ public_domain ~ '/' ~ internal_gateway_ip)
          | list)
      }}

- name: DNS | Set dnsmasq address overrides
  community.openwrt.uci:
    command: set
    key: "dhcp.@dnsmasq[0].address"
    value: "{{ openwrt_router_dnsmasq_address_directives }}"
  when: openwrt_router_dnsmasq_address_directives | length > 0
  notify: Reload dnsmasq

- name: DNS | Commit dhcp config
  community.openwrt.uci:
    command: commit
    config: dhcp
  when: openwrt_router_dnsmasq_address_directives | length > 0
  notify: Reload dnsmasq
