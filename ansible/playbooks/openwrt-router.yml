---
- name: Configure OpenWrt router
  hosts: openwrt
  gather_facts: false        # python-free per community.openwrt official guidance
  any_errors_fatal: true
  vars:
    openwrt_router_dns_domain: lan
    openwrt_router_opkg_packages:
      # Prometheus node exporter + collectors
      - prometheus-node-exporter-lua
      - prometheus-node-exporter-lua-hwmon
      - prometheus-node-exporter-lua-nat_traffic
      - prometheus-node-exporter-lua-netstat
      - prometheus-node-exporter-lua-openwrt
      - prometheus-node-exporter-lua-snmp6
      - prometheus-node-exporter-lua-thermal
      - prometheus-node-exporter-lua-uci_dhcp_host
      - prometheus-node-exporter-lua-wifi
      - prometheus-node-exporter-lua-wifi_stations
      # Dynamic DNS
      - luci-app-ddns
      - ddns-scripts
      - ddns-scripts-cloudflare
      - ddns-scripts-noip
      - ddns-scripts-services
      - ddns-scripts-utils
      # DNS debugging tools
      - bind-tools
      - drill
    # openwrt_router_dhcp_reservations comes from
    # ansible/inventory/group_vars/openwrt/dhcp.sops.yml (sops-encrypted).
    # Currently unmanaged on purpose:
    #   - host[7]  tradfri          (no name)
    #   - host[9]  kube-vip-invalid (no name)
    #   - domain   mqtt.lan -> virtual hostname, no lease
    #   - domain   console.gl-inet.com -> router self (vendor vanity)
    # `internal_gateway_ip` is defined in
    # ansible/inventory/group_vars/openwrt/network.yml.
    openwrt_router_dns_address_overrides:
      - { domain: "{{ secret_domain }}", ip: "{{ internal_gateway_ip }}" }
      - { domain: "home.lan", ip: "{{ internal_gateway_ip }}" }
    # Public-domain hostnames also served via the LAN gateway. Each entry is
    # expanded by the role into `address=/<sub>.<public_domain>/<gateway>` so
    # LAN clients skip the Cloudflare Tunnel hairpin. flux-webhook is excluded
    # on purpose — only GitHub calls it.
    public_lan_subdomains:
      - analytics
      - auth
      - drive
      - media
      - photos
      - portfolio
      - share
      - notes
      - readeck
  roles:
    - role: community.openwrt.init
      vars:
        openwrt_install_recommended_packages: true
    - role: openwrt_router
