---
# Restricts ingress to pods labelled `lan-only: "true"` to LAN CIDRs only.
# Selector intentionally matches pods (not Services), so the label must be applied via
# spec.template.metadata.labels (bjw-s app-template: defaultPodOptions.labels).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: lan-only
spec:
  endpointSelector:
    matchLabels:
      lan-only: "true"
  ingress:
    - fromEntities:
        - cluster
    - fromCIDRSet:
        - cidr: 192.168.0.0/16
        - cidr: 10.0.0.0/8
