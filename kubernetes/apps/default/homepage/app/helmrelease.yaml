---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app homepage
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    controllers:
      homepage:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
            env:
              LOG_LEVEL: info
              HOMEPAGE_ALLOWED_HOSTS: "*"
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthcheck
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]

    defaultPodOptions:
      automountServiceAccountToken: true
      labels:
        lan-only: "true"

    serviceAccount:
      homepage: {}

    service:
      app:
        controller: homepage
        ports:
          http:
            port: *port

    persistence:
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
      config:
        type: configMap
        name: homepage
        globalMounts:
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true
          - path: /app/config/docker.yaml
            subPath: docker.yaml
            readOnly: true
          - path: /app/config/custom.css
            subPath: custom.css
            readOnly: true
          - path: /app/config/custom.js
            subPath: custom.js
            readOnly: true

    configMaps:
      config:
        enabled: true
        data:
          settings.yaml: |
            title: Rasp K3s
            headerStyle: clean
            theme: dark
            color: slate
            layout:
              Media:
                style: row
                columns: 4
              Photos:
                style: row
                columns: 4
              Productivity:
                style: row
                columns: 4
              Storage:
                style: row
                columns: 4
              Monitoring:
                style: row
                columns: 4
              Home:
                style: row
                columns: 4
            providers: {}
          services.yaml: |
            - Monitoring:
                - PagerDuty:
                    href: https://smoothship.eu.pagerduty.com/
                    icon: mdi-alert
          bookmarks.yaml: |
            []
          widgets.yaml: |
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: cluster
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
          kubernetes.yaml: |
            mode: cluster
            gateway: true
          docker.yaml: ""
          custom.css: ""
          custom.js: ""
