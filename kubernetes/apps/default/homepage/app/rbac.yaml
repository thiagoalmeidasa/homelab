---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - nodes
      - services
      - endpoints
    verbs: [get, list]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: [gateways, httproutes]
    verbs: [get, list]
  - apiGroups: ["traefik.containo.us", "traefik.io"]
    resources: [ingressroutes]
    verbs: [get, list]
  - apiGroups: ["metrics.k8s.io"]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: default
