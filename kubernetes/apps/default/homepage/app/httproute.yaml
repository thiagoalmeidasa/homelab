---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: default
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "homepage.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: homepage
          port: 3000
