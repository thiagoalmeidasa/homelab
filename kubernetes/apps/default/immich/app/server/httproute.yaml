---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: default
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/icon: arcticons:immich
    hajimari.io/info: Manage Photos
    hajimari.io/group: media
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "photos.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-public
  namespace: default
spec:
  parentRefs:
    - name: external
      namespace: networking
      sectionName: https
  hostnames:
    - "photos.${PUBLIC_DOMAIN}"
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
