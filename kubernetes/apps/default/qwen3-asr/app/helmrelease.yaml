---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qwen3-asr
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      qwen3-asr:
        containers:
          app:
            image:
              repository: lancelrq/qwen3-asr-service
              tag: 2.4.0-cpu@sha256:db8dd0ec66a12e27ec225d9de480d5da871138b289ec5eadb6066e77ee3c93cf
            args:
              - --enable-openai-api
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v2/health
                    port: &port 8765
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 1
                memory: 4Gi
              limits:
                memory: 6Gi
    service:
      app:
        controller: qwen3-asr
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Qwen3 ASR
          gethomepage.dev/group: AI
          gethomepage.dev/icon: mdi-speech-recognition
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["qwen3-asr.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: longhorn
        size: 5Gi
        retain: true
        labels:
          recurring-job-group.longhorn.io/backup: enabled
          recurring-job.longhorn.io/source: enabled
        globalMounts:
          - path: /app/models
