---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app whisper-cpp
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      whisper-cpp:
        initContainers:
          model:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                if [ ! -f /models/ggml-large-v3-turbo.bin ]; then
                  echo "Downloading Whisper Turbo model..."
                  wget -q -O /models/ggml-large-v3-turbo.bin https://blob.handy.computer/ggml-large-v3-turbo.bin
                  echo "Download complete."
                else
                  echo "Model already present, skipping download."
                fi
        pod:
          securityContext:
            supplementalGroups:
              - 44   # video
              - 109  # render (cn5, cn8)
              - 990  # render (cn3)
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/whisper.cpp
              tag: main-vulkan@sha256:2d82df4ba676351c2d2b51ece3621c9952abad07a5a8a5dfda19900e8b1ae335
            command:
              - whisper-server
            args:
              - --model
              - /models/ggml-large-v3-turbo.bin
              - --host
              - 0.0.0.0
              - --port
              - "8080"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
                gpu.intel.com/i915: 1
              limits:
                memory: 2Gi
                gpu.intel.com/i915: 1
    service:
      app:
        controller: whisper-cpp
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Whisper
          gethomepage.dev/group: AI
          gethomepage.dev/icon: mdi-microphone
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["whisper.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: longhorn
        size: 5Gi
        retain: true
        labels:
          recurring-job-group.longhorn.io/backup: enabled
          recurring-job.longhorn.io/source: enabled
        globalMounts:
          - path: /models
