---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ocis
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  driftDetection:
    mode: enabled
  values:
    controllers:
      ocis:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-config:
            image:
              repository: docker.io/owncloud/ocis
              tag: 8.0.4@sha256:f5940c7f686cbf8f2725e4cc19c319b35f84449e49cfbea02973fc8efd9f5a28
            command:
              - /bin/sh
              - -c
            args:
              - |
                if [ ! -f /etc/ocis/ocis.yaml ]; then ocis init; else exit 0; fi
            env:
              OCIS_INSECURE: true
        containers:
          ocis:
            image:
              repository: docker.io/owncloud/ocis
              tag: 8.0.4@sha256:f5940c7f686cbf8f2725e4cc19c319b35f84449e49cfbea02973fc8efd9f5a28
            env:
              DEMO_USERS: false
              OCIS_LOG_COLOR: true
              OCIS_LOG_LEVEL: warn
              OCIS_LOG_PRETTY: true
              OCIS_URL: https://arai.${PUBLIC_DOMAIN}
              OCIS_SHARING_PUBLIC_SHARE_MUST_HAVE_PASSWORD: true
              PROXY_DEBUG_ADDR: 0.0.0.0:9205
              PROXY_TLS: false
              TZ: ${TIMEZONE}
              OCIS_EXCLUDE_RUN_SERVICES: idp
              OCIS_OIDC_ISSUER: https://auth.${PUBLIC_DOMAIN}
              WEB_OIDC_METADATA_URL: https://auth.${PUBLIC_DOMAIN}/.well-known/openid-configuration
              WEB_OIDC_CLIENT_ID: e31855d0-8b46-408e-94a3-37f96ab0effb
              WEB_OIDC_SCOPE: openid profile email groups
              PROXY_AUTOPROVISION_ACCOUNTS: true
              PROXY_OIDC_REWRITE_WELLKNOWN: true
              PROXY_USER_OIDC_CLAIM: preferred_username
              PROXY_ROLE_ASSIGNMENT_DRIVER: oidc
              PROXY_ROLE_ASSIGNMENT_OIDC_CLAIM: groups
              PROXY_CSP_CONFIG_FILE_LOCATION: /etc/ocis/csp.yaml
            envFrom:
              - secretRef:
                  name: ocis-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: *app
        ports:
          http:
            port: 9200
            primary: true
          metrics:
            port: 9205
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
    route:
      internal:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: oCIS
          gethomepage.dev/group: Productivity
          gethomepage.dev/icon: owncloud.png
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["arai.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
      public:
        parentRefs:
          - name: external
            namespace: networking
            sectionName: https
        hostnames: ["arai.${PUBLIC_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        retain: true
        size: 1Gi
        storageClass: longhorn
        globalMounts:
          - path: /etc/ocis
            subPath: config
      web-config:
        type: configMap
        name: ocis
        globalMounts:
          - path: /etc/ocis/web.yaml
            subPath: web.yaml
            readOnly: true
          - path: /etc/ocis/csp.yaml
            subPath: csp.yaml
            readOnly: true
      data:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_KUBERNETES}/ocis"
        globalMounts:
          - path: /var/lib/ocis
            subPath: data
      tmpfs:
        type: emptyDir
        advancedMounts:
          ocis:
            app:
              - path: /tmp
                subPath: tmp
