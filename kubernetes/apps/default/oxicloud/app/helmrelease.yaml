---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app oxicloud
  namespace: default
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      oxicloud:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/diocrafts/oxicloud
              tag: 0.8.0@sha256:e371fe3cc0682fe0de09ede1fa88430e189fcf4bbb8645135b815f176c6602a6
            env:
              OXICLOUD_BASE_URL: https://oxicloud.${SECRET_DOMAIN}
              OXICLOUD_SERVER_HOST: 0.0.0.0
              OXICLOUD_SERVER_PORT: &port 8086
              OXICLOUD_STORAGE_PATH: /data
              OXICLOUD_ENABLE_AUTH: "true"
              OXICLOUD_ENABLE_FILE_SHARING: "true"
              OXICLOUD_ENABLE_SEARCH: "true"
              OXICLOUD_ENABLE_TRASH: "true"
              OXICLOUD_OIDC_ENABLED: "true"
              OXICLOUD_OIDC_ISSUER_URL: https://auth.${PUBLIC_DOMAIN}
              OXICLOUD_OIDC_CLIENT_ID: f32140c9-033d-4db5-86ac-a8dadb5255e0
              OXICLOUD_OIDC_REDIRECT_URI: https://oxicloud.${SECRET_DOMAIN}/api/auth/oidc/callback
              OXICLOUD_OIDC_FRONTEND_URL: https://oxicloud.${SECRET_DOMAIN}/login
              OXICLOUD_OIDC_SCOPES: openid profile email groups
              OXICLOUD_OIDC_AUTO_PROVISION: "true"
              OXICLOUD_OIDC_DISABLE_PASSWORD_LOGIN: "true"
              OXICLOUD_OIDC_PROVIDER_NAME: Pocket ID
              OXICLOUD_OIDC_ADMIN_GROUPS: oxicloud-admins
              OXICLOUD_SMTP_HOST: smtp-relay.networking.svc.cluster.local
              OXICLOUD_SMTP_PORT: "25"
              OXICLOUD_SMTP_FROM: noreply@mail.thiagoalmeida.xyz
              OXICLOUD_SMTP_TLS: none
            envFrom:
              - secretRef:
                  name: oxicloud-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault

    service:
      app:
        controller: oxicloud
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: OxiCloud
          gethomepage.dev/group: Productivity
          gethomepage.dev/icon: https://raw.githubusercontent.com/AtalayaLabs/OxiCloud/main/images/oxicloud-logo.png
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames:
          - "oxicloud.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      data:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_KUBERNETES}/oxicloud"
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
