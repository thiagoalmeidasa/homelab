---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photoprism
  namespace: default
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/icon: arcticons:photoprism
    hajimari.io/info: Manage Photos
    hajimari.io/group: media
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "portfolio.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: photoprism
          port: 2342
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: photoprism-public
  namespace: default
spec:
  parentRefs:
    - name: external
      namespace: networking
      sectionName: https
  hostnames:
    - "portfolio.${PUBLIC_DOMAIN}"
  rules:
    - backendRefs:
        - name: photoprism
          port: 2342
