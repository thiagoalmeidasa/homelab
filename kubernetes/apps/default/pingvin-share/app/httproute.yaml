---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pingvin-share
  namespace: default
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Pingvin Share
    gethomepage.dev/group: Productivity
    gethomepage.dev/icon: pingvin-share.png
spec:
  parentRefs:
    - name: external
      namespace: networking
      sectionName: https
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "share.${PUBLIC_DOMAIN}"
  rules:
    - backendRefs:
        - name: pingvin
          port: 3000
