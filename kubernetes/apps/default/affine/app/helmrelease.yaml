---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app affine
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  maxHistory: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      affine:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          affine-migration:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.27.0@sha256:cc309913620e153f7aaea47cd40d1eff993030cf2b2df8f88270663459db37c9
            command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
            env:
              AFFINE_INDEXER_ENABLED: false
            envFrom: &envFrom
              - secretRef:
                  name: affine-secret

        containers:
          app:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.27.0@sha256:cc309913620e153f7aaea47cd40d1eff993030cf2b2df8f88270663459db37c9
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
              NODE_ENV: production
              # Server configuration
              PORT: &port "3010"
              AFFINE_SERVER_EXTERNAL_URL: https://notes.${PUBLIC_DOMAIN}
              AFFINE_SERVER_HTTPS: "true"
              AFFINE_INDEXER_ENABLED: false
              # Authentication
              OAUTH_EMAIL_LOGIN: "false"
              # SMTP
              MAILER_HOST: smtp-relay.networking.svc.cluster.local
              MAILER_PORT: "25"
              MAILER_SENDER: Affine <no-reply@thiagoalmeida.xyz>
              # Storage
              DB_DATA_LOCATION: /data/database
              UPLOAD_LOCATION: /data/uploads
              CONFIG_LOCATION: /data/config
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    # Ask for rootless container
    # defaultPodOptions:
    #   securityContext:
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: "OnRootMismatch"
    #     seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Affine
          gethomepage.dev/group: Productivity
          gethomepage.dev/icon: affine.png
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["notes.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
      public:
        parentRefs:
          - name: external
            namespace: networking
            sectionName: https
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["notes.${PUBLIC_DOMAIN}"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /admin
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        retain: true
        size: 10Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
      config:
        type: secret
        name: affine-secret
        advancedMounts:
          affine:
            app:
              - path: /root/.affine/config/config.json
                subPath: config.json
                readOnly: true
