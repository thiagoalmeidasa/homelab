---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app affine
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  maxHistory: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      affine:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          affine-migration:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.6@sha256:d1c65f5d545d3e0a51c1696c482739915fbf402ba37cefb31539a1de095531e8
            command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
            env:
              AFFINE_INDEXER_ENABLED: false
            envFrom: &envFrom
              - secretRef:
                  name: affine-secret

        containers:
          app:
            image:
              repository: ghcr.io/toeverything/affine
              tag: 0.26.6@sha256:d1c65f5d545d3e0a51c1696c482739915fbf402ba37cefb31539a1de095531e8
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
              NODE_ENV: production
              # Server configuration
              PORT: &port "3010"
              AFFINE_INDEXER_ENABLED: false
              # Authentication
              OAUTH_EMAIL_LOGIN: "false"
              # Storage
              DB_DATA_LOCATION: /data/database
              UPLOAD_LOCATION: /data/uploads
              CONFIG_LOCATION: /data/config
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    # Ask for rootless container
    # defaultPodOptions:
    #   securityContext:
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: "OnRootMismatch"
    #     seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          hajimari.io/enable: "true"
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["notes.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
      public:
        annotations:
          hajimari.io/enable: "false"
        parentRefs:
          - name: external
            namespace: networking
            sectionName: https
        hostnames: ["notes.${PUBLIC_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        retain: true
        size: 10Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
