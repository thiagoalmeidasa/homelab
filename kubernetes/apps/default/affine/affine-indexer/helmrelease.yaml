---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: affine-indexer
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  maxHistory: 3
  values:
    controllers:
      affine-indexer:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: manticoresearch/manticore
              tag: dev-16.0.8-c47134f
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9308
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: affine-indexer
        ports:
          http:
            port: 9308
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        retain: true
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /var/lib/manticore
      tmp:
        type: emptyDir
