---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-barman-cloud
  namespace: cnpg-system
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: cnpg-barman-cloud
    namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
