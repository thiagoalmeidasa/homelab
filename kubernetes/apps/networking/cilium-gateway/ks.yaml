---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-cilium-gateway
  namespace: flux-system
spec:
  dependsOn:
    - name: cilium
    - name: cluster-apps-certificates
  path: ./kubernetes/apps/networking/cilium-gateway/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
