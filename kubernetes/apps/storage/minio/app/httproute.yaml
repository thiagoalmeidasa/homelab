---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: storage
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: MinIO
    gethomepage.dev/group: Storage
    gethomepage.dev/icon: minio.png
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "minio.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: minio
          port: 9001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: storage
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "s3.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: minio
          port: 9000
