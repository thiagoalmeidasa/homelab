---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: storage
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://charts.longhorn.io
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    global:
      tolerations:
        - key: "node-role.kubernetes.io/small"
          operator: "Exists"
          effect: "NoSchedule"
    persistence:
      defaultClass: false
      defaultClassReplicaCount: "2"
    defaultSettings:
      backupTarget: "nfs://nfs.lan://volume1/backups/k8s/longhorn"
      defaultReplicaCount: "2"
      v2DataEngineGuaranteedInstanceManagerCPU: "750"
      guaranteedInstanceManagerCPU: "5"
      taintToleration: "node-role.kubernetes.io/small:NoSchedule"
    ingress:
      enabled: false
