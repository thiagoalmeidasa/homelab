---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: storage
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/appName: Longhorn
    hajimari.io/icon: nas
    hajimari.io/group: storage
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "longhorn.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
