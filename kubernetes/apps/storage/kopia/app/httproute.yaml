---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kopia
  namespace: storage
  annotations:
    hajimari.io/enable: "true"
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "kopia.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: kopia
          port: 80
