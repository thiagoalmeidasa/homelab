---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rustfs
  namespace: storage
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      rustfs:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          app:
            image:
              repository: docker.io/rustfs/rustfs
              tag: 1.0.0-beta.3@sha256:378642b05b7dcb4849fb77ebe6aca4ced1c3f66e7e504247df95a5c9018d3358
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
              RUSTFS_VOLUMES: /data
              RUSTFS_ADDRESS: ":9000"
              RUSTFS_CONSOLE_ENABLE: "true"
              RUSTFS_CONSOLE_ADDRESS: ":9001"
            envFrom:
              - secretRef:
                  name: rustfs-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        ports:
          api:
            port: *port
          http:
            port: 9001
    route:
      console:
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["rustfs.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
      s3:
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["s3-rustfs.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: api
    persistence:
      data:
        accessMode: ReadWriteOnce
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-provision
        size: 20Gi
        globalMounts:
          - path: /data
