---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app versitygw
  namespace: storage
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      versitygw:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          app:
            image:
              repository: ghcr.io/versity/versitygw
              tag: v1.6.0@sha256:d6ec798f66cac65bd5813d94fbe51edf658120d749c1cf5b572b63a2334c4d81
            args:
              - --health
              - /_health
              - --iam-dir
              - /iam
              - --webui
              - ":7071"
              - posix
              - --sidecar
              - /sidecar
              - --disable-copy-file-range
              - /data
            env:
              TZ: "${TIMEZONE:=Etc/UTC}"
              VGW_PORT: ":7070"
              VGW_ADMIN_PORT: ":7072"
              VGW_REGION: us-east-1
              VGW_WEBUI_GATEWAYS: "https://s3.${SECRET_DOMAIN}"
              VGW_WEBUI_ADMIN_GATEWAYS: "https://s3-admin.${SECRET_DOMAIN}"
              VGW_CORS_ALLOW_ORIGIN: "https://s3-console.${SECRET_DOMAIN}"
            envFrom:
              - secretRef:
                  name: versitygw-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: &port 7070
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: *app
        ports:
          s3:
            port: *port
          webui:
            port: 7071
          admin:
            port: 7072
    route:
      webui:
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["s3-console.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: webui
      s3:
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["s3.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: s3
      admin:
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["s3-admin.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: admin
    persistence:
      data:
        accessMode: ReadWriteOnce
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-provision
        size: 30Gi
        globalMounts:
          - path: /data
      iam:
        accessMode: ReadWriteOnce
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-provision
        size: 1Gi
        globalMounts:
          - path: /iam
      sidecar:
        accessMode: ReadWriteOnce
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-provision
        size: 5Gi
        globalMounts:
          - path: /sidecar
