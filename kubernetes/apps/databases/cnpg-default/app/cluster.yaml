---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-default
  namespace: databases
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  inheritedMetadata:
    labels:
      recurring-job-group.longhorn.io/backup: enabled
      recurring-job.longhorn.io/source: enabled
  bootstrap:
    initdb:
      database: hass
      owner: hass
  postgresql:
    parameters:
      wal_keep_size: "128MB"
      max_wal_size: "512MB"
      max_slot_wal_keep_size: "512MB"
  managed:
    roles:
      - name: hoodik
        login: true
        passwordSecret:
          name: cnpg-default-hoodik
      - name: oxicloud
        login: true
        passwordSecret:
          name: cnpg-default-oxicloud
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  storage:
    size: 10Gi
    storageClass: longhorn
  backup:
    volumeSnapshot:
      className: longhorn-snapshot-class
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-default-object-store
