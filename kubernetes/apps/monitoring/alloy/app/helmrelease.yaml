---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: alloy
    namespace: flux-system
  dependsOn:
    - name: loki
  values:
    alloy:
      mounts:
        varlog: true
        extra:
          - name: var-journal
            mountPath: /var/log/journal
            readOnly: true
          - name: run-journal
            mountPath: /run/log/journal
            readOnly: true
          - name: machine-id
            mountPath: /etc/machine-id
            readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 128Mi
      extraPorts:
        - name: syslog-tcp
          port: 1514
          targetPort: 1514
          protocol: TCP
        - name: syslog-udp
          port: 1514
          targetPort: 1514
          protocol: UDP
      configMap:
        content: |
          // Container logs discovery
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_controller_name"]
              regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
              target_label  = "__tmp_controller_name"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
              regex         = "^;*([^;]+)(;.*)?$"
              target_label  = "app"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
              regex         = "^;*([^;]+)(;.*)?$"
              target_label  = "instance"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
              target_label  = "component"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node_name"
            }

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }

            rule {
              source_labels = ["__meta_kubernetes_namespace", "app"]
              separator     = "/"
              target_label  = "job"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              target_label  = "__path__"
              replacement   = "/var/log/pods/*$1/*.log"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_id"]
              regex         = "^(\\w+):\\/\\/.+$"
              target_label  = "__path__"
              replacement   = "/var/log/pods/*$1/*.log"
              action        = "replace"
            }
          }

          loki.source.file "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.write.default.receiver]
          }

          // Systemd journal
          loki.source.journal "journal" {
            path       = "/var/log/journal"
            max_age    = "12h"
            forward_to = [loki.relabel.journal.receiver]
            labels     = {
              job = "systemd-journal",
            }
          }

          loki.relabel "journal" {
            forward_to = [loki.write.default.receiver]

            rule {
              source_labels = ["__journal__systemd_unit"]
              target_label  = "unit"
            }

            rule {
              source_labels = ["__journal__hostname"]
              target_label  = "node_name"
            }

            rule {
              source_labels = ["__journal_syslog_identifier"]
              target_label  = "syslog_identifier"
            }
          }

          // Syslog - TCP listener
          loki.source.syslog "syslog_tcp" {
            listener {
              address               = "0.0.0.0:1514"
              protocol              = "tcp"
              syslog_format         = "rfc3164"
              idle_timeout          = "60s"
              label_structured_data = true
              labels                = {
                job = "syslog",
              }
            }
            forward_to = [loki.relabel.syslog.receiver]
          }

          // Syslog - UDP listener
          loki.source.syslog "syslog_udp" {
            listener {
              address               = "0.0.0.0:1514"
              protocol              = "udp"
              syslog_format         = "rfc3164"
              label_structured_data = true
              labels                = {
                job = "syslog",
              }
            }
            forward_to = [loki.relabel.syslog.receiver]
          }

          loki.relabel "syslog" {
            forward_to = [loki.write.default.receiver]

            rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "host"
            }

            rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "hostname"
            }

            rule {
              source_labels = ["__syslog_message_severity"]
              target_label  = "level"
            }

            rule {
              source_labels = ["__syslog_message_app_name"]
              target_label  = "application"
            }

            rule {
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
            }

            rule {
              source_labels = ["__syslog_connection_hostname"]
              target_label  = "connection_hostname"
            }
          }

          // Write to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki-gateway/loki/api/v1/push"
            }
          }

    controller:
      type: daemonset
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      volumes:
        extra:
          - name: var-journal
            hostPath:
              path: /var/log/journal
          - name: run-journal
            hostPath:
              path: /run/log/journal
          - name: machine-id
            hostPath:
              path: /etc/machine-id

    serviceMonitor:
      enabled: true

    extraObjects:
      - apiVersion: v1
        kind: Service
        metadata:
          name: alloy-syslog
          namespace: monitoring
          annotations:
            lbipam.cilium.io/ips: "${ALLOY_SYSLOG}"
        spec:
          type: LoadBalancer
          externalTrafficPolicy: Local
          selector:
            app.kubernetes.io/name: alloy
          ports:
            - name: syslog-tcp
              port: 1514
              targetPort: 1514
              protocol: TCP
            - name: syslog-udp
              port: 1514
              targetPort: 1514
              protocol: UDP
