---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Loki
    gethomepage.dev/group: Monitoring
    gethomepage.dev/icon: loki.png
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "loki.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: loki-gateway
          port: 80
