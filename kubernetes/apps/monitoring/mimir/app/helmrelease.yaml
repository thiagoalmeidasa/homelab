# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    configMaps:
      config:
        enabled: true
        data:
          config.yaml: |
            multitenancy_enabled: false

            server:
              http_listen_port: 8080
              log_level: info

            common:
              storage:
                backend: s3
                s3:
                  endpoint: $${BUCKET_HOST}
                  access_key_id: $${AWS_ACCESS_KEY_ID}
                  secret_access_key: $${AWS_SECRET_ACCESS_KEY}
                  insecure: false
                  bucket_lookup_type: path

            distributor:
              ring:
                kvstore:
                  store: memberlist

            ingester:
              ring:
                final_sleep: 0s
                num_tokens: 512
                kvstore:
                  store: memberlist
                replication_factor: 1

            memberlist:
              join_members:
                - localhost:7946

            store_gateway:
              sharding_ring:
                replication_factor: 1
                kvstore:
                  store: memberlist

            blocks_storage:
              backend: s3
              s3:
                bucket_name: mimir
              storage_prefix: blocks
              bucket_store:
                sync_dir: /data/tsdb-sync
              tsdb:
                dir: /data/tsdb

            compactor:
              data_dir: /data/compactor
              sharding_ring:
                kvstore:
                  store: memberlist

            ruler:
              rule_path: /data/ruler

            ruler_storage:
              backend: s3
              s3:
                bucket_name: mimir
              storage_prefix: ruler

            limits:
              compactor_blocks_retention_period: 2160h
              max_global_series_per_user: 0
              ingestion_rate: 50000
              ingestion_burst_size: 100000

    controllers:
      mimir:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/grafana/mimir
              tag: 3.0.6@sha256:4508fd612969dfcf4b50276856fd05d5a971b15e494ad53da911b44781446f2b
            args:
              - -config.file=/etc/mimir/config.yaml
              - -config.expand-env=true
              - -target=all
              - -activity-tracker.filepath=/tmp/metrics-activity.log
            envFrom:
              - secretRef:
                  name: mimir-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: &port 8080
                  initialDelaySeconds: 45
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 5
                  timeoutSeconds: 1
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: mimir
        ports:
          http:
            port: *port
            protocol: HTTP
            primary: true
          grpc:
            port: 9095
            protocol: TCP
          memberlist:
            port: 7946
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /data
      config:
        type: configMap
        name: mimir
        globalMounts:
          - path: /etc/mimir
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
