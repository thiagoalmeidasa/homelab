---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      # renovate: registryUrl=https://grafana.github.io/helm-charts
      chart: mimir-distributed
      version: 6.0.6
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    deploymentMode: monolithic

    mimir:
      auth_enabled: false
      structuredConfig:
        common:
          storage:
            backend: s3
            s3:
              insecure: false
              s3forcepathstyle: true
        blocks_storage:
          backend: s3
          s3:
            bucket_name: mimir
          tsdb:
            dir: /data/tsdb
        compactor:
          data_dir: /data/compactor
          sharding_ring:
            kvstore:
              store: memberlist
        limits:
          compactor_blocks_retention_period: 2160h # 90 days
          max_global_series_per_user: 0
          ingestion_rate: 50000
          ingestion_burst_size: 100000
        ruler_storage:
          backend: s3
          s3:
            bucket_name: mimir
        alertmanager_storage:
          backend: s3
          s3:
            bucket_name: mimir
        server:
          log_level: info

    minio:
      enabled: false

    nginx:
      enabled: false

    ruler:
      enabled: false
    alertmanager:
      enabled: false
    overrides_exporter:
      enabled: false

    ingester:
      replicas: 1
      persistentVolume:
        storageClass: longhorn
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]

    store_gateway:
      replicas: 1
      persistentVolume:
        storageClass: longhorn
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    compactor:
      replicas: 1
      persistentVolume:
        storageClass: longhorn
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    distributor:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    querier:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    query_frontend:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

    query_scheduler:
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

  valuesFrom:
    - kind: Secret
      targetPath: mimir.structuredConfig.common.storage.s3.endpoint
      name: mimir-secret
      valuesKey: BUCKET_HOST
    - kind: Secret
      targetPath: mimir.structuredConfig.common.storage.s3.access_key_id
      name: mimir-secret
      valuesKey: AWS_ACCESS_KEY_ID
    - kind: Secret
      targetPath: mimir.structuredConfig.common.storage.s3.secret_access_key
      name: mimir-secret
      valuesKey: AWS_SECRET_ACCESS_KEY
