---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Sonarr
    gethomepage.dev/group: Media
    gethomepage.dev/icon: sonarr.png
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "sonarr.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: sonarr
          port: 8989
