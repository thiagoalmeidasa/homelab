---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 5
  values:
    defaultPodOptions:
      annotations:
        setGateway: "false"
    controllers:
      jellyfin:
        annotations:
          setGateway: "false"
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 44  # video
              - 109  # render (cn5, cn8)
              - 990  # render (cn3)
        containers:
          main:
            image:
              repository: jellyfin/jellyfin
              tag: 10.11.11
            env:
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              JELLYFIN_FFmpeg__probesize: 50000000
              JELLYFIN_FFmpeg__analyzeduration: 50000000
              JELLYFIN_CACHE_DIR: /cache
            resources:
              requests:
                cpu: 1
                memory: 1Gi
                gpu.intel.com/i915: 1
              limits:
                memory: 3Gi
                gpu.intel.com/i915: 1
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3

              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
          exporter:
            image:
              repository: rebelcore/jellyfin-exporter
              tag: v1.5.2@sha256:8a1294b7fea80993e4ec18220e391578e0f9ca9e109294fd6a379d2cb5213c85
            args:
              - --jellyfin.address=http://jellyfin:8096
              - --jellyfin.token=${JELLYFIN_EXPORTER_API_KEY}
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 225Mi
            probes:
              liveness: &exporterProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &exporterPort 9594
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3

              readiness: *exporterProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *exporterPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
    service:
      main:
        controller: *app
        ports:
          http:
            port: *port
          exporter:
            port: *exporterPort
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: http
            scheme: http
            path: /metrics
      exporter:
        serviceName: *app
        endpoints:
          - port: exporter
            scheme: http
            path: /metrics
    persistence:
      config:
        accessMode: ReadWriteOnce
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 40Gi
        retain: true
        labels:
          recurring-job-group.longhorn.io/backup: enabled
          recurring-job.longhorn.io/source: enabled
        globalMounts:
          - path: /config
      movies:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_MEDIA}/movies"
        globalMounts:
          - path: "/media/movies"
      tvshows:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_MEDIA}/tvshows"
        globalMounts:
          - path: "/media/tvshows"
      intros:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_MEDIA}/intros"
        globalMounts:
          - path: "/media/intros"
      jellyfin-cache:
        type: nfs
        server: "${NFS_SERVER}"
        path: "${NFS_MEDIA}/.cache/jellyfin"
        globalMounts:
          - path: "/config/data/subtitles"
            subPath: subtitles
          - path: "/config/metadata/People"
            subPath: people
      transcode:
        enabled: true
        type: emptyDir
      cache:
        enabled: true
        type: emptyDir
