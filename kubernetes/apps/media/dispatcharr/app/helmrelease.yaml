---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name dispatcharr
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: *name
    controllers:
      dispatcharr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/dispatcharr/dispatcharr
              tag: 0.27.0@sha256:425129020764037869c7d1a2e74ba57ca640cb5d551ef57d869b745b6ea71c7b
            env:
              TZ: ${TIMEZONE}
              DISPATCHARR_ENV: modular
              DISPATCHARR_LOG_LEVEL: info
              DISPATCHARR_PORT: &port 9191
              POSTGRES_HOST: cnpg-media-rw.databases.svc.cluster.local
              POSTGRES_PORT: "5432"
              POSTGRES_DB: dispatcharr
              REDIS_HOST: redis-master.databases.svc.cluster.local
              REDIS_PORT: "6379"
              CELERY_BROKER_URL: redis://redis-master.databases.svc.cluster.local:6379/0
            envFrom:
              - secretRef:
                  name: dispatcharr-secret
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *name
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Dispatcharr
          gethomepage.dev/group: Media
          gethomepage.dev/icon: dispatcharr.png
        parentRefs:
          - name: internal
            namespace: networking
            sectionName: https
        hostnames: ["dispatcharr.${SECRET_DOMAIN}"]
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        existingClaim: *name
        advancedMounts:
          dispatcharr:
            app:
              - path: /data
                subPath: data
      tmp:
        type: emptyDir
        advancedMounts:
          dispatcharr:
            app:
              - path: /tmp
                subPath: tmp
