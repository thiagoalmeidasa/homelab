---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prowlarr
  namespace: media
  annotations:
    hajimari.io/enable: "true"
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "prowlarr.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: prowlarr
          port: 80
