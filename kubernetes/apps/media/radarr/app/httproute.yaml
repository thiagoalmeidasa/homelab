---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radarr
  namespace: media
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Radarr
    gethomepage.dev/group: Media
    gethomepage.dev/icon: radarr.png
spec:
  parentRefs:
    - name: internal
      namespace: networking
      sectionName: https
  hostnames:
    - "radarr.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: radarr
          port: 7878
