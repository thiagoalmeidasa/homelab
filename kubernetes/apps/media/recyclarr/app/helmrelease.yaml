---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      recyclarr:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          schedule: "0 2 * * *"
          timeZone: ${TIMEZONE}
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          backoffLimit: 0
        pod:
          annotations:
            setGateway: "false"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
        containers:
          app:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.7.0@sha256:2d6107f758d882a59fe9d646aa54fa8a5a4fb7a40995125fade575652a3f7871
            args: ["sync"]
            env:
              TZ: ${TIMEZONE}
              COMPlus_EnableDiagnostics: "0"
              RECYCLARR_CONFIG_DIR: /config
            envFrom:
              - secretRef:
                  name: recyclarr-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        name: recyclarr
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    configMaps:
      config:
        enabled: true
        data:
          recyclarr.yml: |
            sonarr:
              sonarr:
                base_url: http://sonarr.media.svc.cluster.local:8989
                api_key: !env_var SONARR_API_KEY
                delete_old_custom_formats: true
                quality_definition:
                  type: series
                quality_profiles:
                  - trash_id: 72dae194fc92bf828f32cde7744e51a1
                    reset_unmatched_scores:
                      enabled: true
                media_naming:
                  series: default
                  season: default
                  episodes:
                    rename: true
                    standard: default
                    daily: default
                    anime: default
            radarr:
              radarr:
                base_url: http://radarr.media.svc.cluster.local:7878
                api_key: !env_var RADARR_API_KEY
                delete_old_custom_formats: true
                quality_definition:
                  type: movie
                quality_profiles:
                  - trash_id: 9ca12ea80aa55ef916e3751f4b874151
                    reset_unmatched_scores:
                      enabled: true
                media_naming:
                  folder: default
                  movie:
                    rename: true
                    standard: standard
