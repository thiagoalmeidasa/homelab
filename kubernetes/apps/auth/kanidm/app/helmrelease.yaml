---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kanidm
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    controllers:
      kanidm:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 389
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/kanidm/server
              tag: 1.10.2@sha256:5d671b5ecb47bc0b5f37d3306f9e7b9b387998bdf5aa451d76a4e764cc05f0fb
            command: ["/sbin/kanidmd"]
            args:
              - server
              - "-c"
              - /etc/kanidm/server.toml
            env:
              KANIDM_LOG_LEVEL: info
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    scheme: HTTPS
                    path: /status
                    port: &port 8443
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    scheme: HTTPS
                    path: /status
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: kanidm
        ports:
          https:
            port: *port
            protocol: TCP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        retain: true
        annotations:
          longhorn.io/number-of-replicas: "3"
        globalMounts:
          - path: /data

      config:
        type: configMap
        name: kanidm
        globalMounts:
          - path: /etc/kanidm/server.toml
            subPath: server.toml
            readOnly: true

      tls:
        type: secret
        name: kanidm-tls
        globalMounts:
          - path: /etc/kanidm/tls
            readOnly: true

    configMaps:
      config:
        data:
          server.toml: |
            version = "2"
            bindaddress = "[::]:8443"
            domain = "auth.${PUBLIC_DOMAIN}"
            origin = "https://auth.${PUBLIC_DOMAIN}"
            db_path = "/data/kanidm.db"
            tls_chain = "/etc/kanidm/tls/tls.crt"
            tls_key = "/etc/kanidm/tls/tls.key"
            role = "WriteReplica"
            online_backup = { path = "/data/backups", schedule = "0 22 * * *", versions = 7 }
