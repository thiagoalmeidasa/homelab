---
name: "Ansible Validate"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "ansible/**"
      - "ansible.cfg"
      - ".ansible-lint"
      - ".github/workflows/ansible-validate.yaml"

jobs:
  ansible-validate:
    name: Ansible Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: ansible/ci-requirements.txt

      - name: Install ansible-lint
        run: pip install -r ansible/ci-requirements.txt

      - name: Cache Ansible Galaxy collections and roles
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.ansible/collections
            ~/.ansible/roles
          key: ansible-galaxy-${{ runner.os }}-${{ hashFiles('ansible/requirements.yml') }}
          restore-keys: |
            ansible-galaxy-${{ runner.os }}-

      - name: Install Galaxy collections and roles
        run: ansible-galaxy install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: ansible-lint ansible/
