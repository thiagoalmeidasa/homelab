---
name: "Flux Validate"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

jobs:
  flux-validate:
    name: Flux Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2

      - name: Setup Flux Schema CLI
        uses: fluxcd/flux-schema/actions/setup@9946a7cd4487b6d47cc9cd27d19ec8a274941af6 # v0.11.0

      - name: Validate manifests
        uses: fluxcd/flux-schema/actions/validate@9946a7cd4487b6d47cc9cd27d19ec8a274941af6 # v0.11.0
        with:
          path: kubernetes
          config: .fluxschema.yml
